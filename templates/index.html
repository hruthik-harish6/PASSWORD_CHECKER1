<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shield - Password Guard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="glass-card">
        <i class="fas fa-shield-halved logo"></i>
        <h1>hruthik<span class="accent">gowda</span></h1>
        <p>Test your defense strength</p>

        <div class="input-container">
            <input type="password" id="passwordField" placeholder="Enter password...">
            <i class="fas fa-eye" id="togglePass"></i>
        </div>

        <div class="meter-container">
            <div id="strengthBar" class="bar"></div>
        </div>
        
        <div class="status-text">
            Security Level: <span id="remark">Waiting...</span>
        </div>

        <ul class="hints">
            <li id="len"><i class="fas fa-circle"></i> 8+ Characters</li>
            <li id="up"><i class="fas fa-circle"></i> Uppercase & Lowercase</li>
            <li id="num"><i class="fas fa-circle"></i> Numbers</li>
            <li id="spec"><i class="fas fa-circle"></i> Special Symbols</li>
        </ul>
    </div>

    <script>
        const passInput = document.getElementById('passwordField');
        const bar = document.getElementById('strengthBar');
        const remark = document.getElementById('remark');

        passInput.addEventListener('input', async () => {
            const val = passInput.value;
            if(!val) {
                bar.style.width = '0%';
                remark.innerText = "Waiting...";
                return;
            }

            const response = await fetch('/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({password: val})
            });
            
            const data = await response.json();
            
            // Update UI
            const colors = ['#ff4d4d', '#ffa500', '#ffff00', '#9acd32', '#00ff7f'];
            const widths = ['20%', '40%', '60%', '80%', '100%'];
            
            bar.style.width = widths[data.score];
            bar.style.backgroundColor = colors[data.score];
            bar.style.boxShadow = `0 0 15px ${colors[data.score]}`;
            remark.innerText = data.remark;
            remark.style.color = colors[data.score];
        });

        // Toggle Password Visibility
        document.getElementById('togglePass').onclick = function() {
            passInput.type = passInput.type === 'password' ? 'text' : 'password';
            this.classList.toggle('fa-eye-slash');
        };
    </script>
</body>
</html>
